<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Logo</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:60px;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#fff;border-radius:12px;padding:50px 60px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center}
img{display:block;margin:0 auto}
.info{color:#aaa;font-size:12px;margin-top:12px}
.dark{padding:30px;margin-top:20px;background:#1A3A5C;border-radius:8px}
.dark .info{color:#888}
</style></head>
<body>
<div class="card">
  <img src="corevein_logo.png" alt="Corevein Connect">
  <div class="info">corevein_logo.png &mdash; 352x80</div>
  <div class="dark">
    <img src="corevein_logo.png" alt="Corevein Connect">
    <div class="info">Dark background</div>
  </div>
</div>
</body></html>
